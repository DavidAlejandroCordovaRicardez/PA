<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agregar Actividad</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;font-size:14px;background:#f0f0f0;color:#222;}

    header{background:#1a5c2a;color:white;padding:12px 16px;
           display:flex;align-items:center;gap:10px;}
    header h1{font-size:17px;letter-spacing:.5px;}
    header p{font-size:11px;opacity:.85;margin-top:2px;}

    .main{max-width:640px;margin:16px auto;padding:0 12px;}

    /* AVISO TOAST */
    .toast{
      position:fixed;top:16px;left:50%;transform:translateX(-50%);
      z-index:999;padding:13px 24px;border-radius:8px;
      font-size:14px;font-weight:bold;
      box-shadow:0 4px 16px rgba(0,0,0,.2);
      opacity:0;transition:opacity .3s;
      pointer-events:none;white-space:nowrap;
      max-width:90vw;text-align:center;}
    .toast.ok {background:#1a5c2a;color:white;}
    .toast.err{background:#c0392b;color:white;}
    .toast.show{opacity:1;pointer-events:auto;}

    /* CARD */
    .card{background:white;border-radius:10px;border:1px solid #ddd;
          box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px;}
    .card-hdr{background:#1a5c2a;color:white;padding:13px 16px;
              border-radius:10px 10px 0 0;font-size:15px;font-weight:bold;
              display:flex;justify-content:space-between;
              align-items:center;gap:8px;flex-wrap:wrap;}
    .card-hdr a{
      color:white;font-size:12px;text-decoration:none;
      background:rgba(255,255,255,.2);padding:6px 14px;
      border-radius:6px;white-space:nowrap;
      transition:background .15s;}
    .card-hdr a:hover{background:rgba(255,255,255,.35);}

    .card-body{padding:18px;}

    /* PIE CON BOTONES */
    .card-ftr{
      padding:14px 16px;
      border-top:2px solid #e8f5e9;
      background:#f4faf5;
      border-radius:0 0 10px 10px;
      display:flex;
      flex-direction:column;
      gap:10px;}

    /* FORMULARIO */
    .fr{margin-bottom:14px;}
    .fr label{display:block;font-size:12px;font-weight:bold;
              margin-bottom:5px;color:#444;}
    .fr input,.fr textarea{
      width:100%;padding:11px 12px;
      border:1.5px solid #ccc;border-radius:8px;
      font-size:14px;font-family:Arial,sans-serif;
      appearance:none;-webkit-appearance:none;
      transition:border-color .2s,box-shadow .2s;
      background:white;}
    .fr input:focus,.fr textarea:focus{
      outline:none;border-color:#1a5c2a;
      box-shadow:0 0 0 3px rgba(26,92,42,.12);}
    .fr textarea{resize:vertical;height:95px;}
    .char{text-align:right;font-size:11px;color:#999;margin-top:3px;}
    .tip{font-size:11px;color:#999;margin-top:3px;}

    .dos-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

    .seccion{
      font-size:11px;font-weight:bold;color:#1a5c2a;
      text-transform:uppercase;letter-spacing:.6px;
      border-bottom:1.5px solid #d4edda;
      padding-bottom:5px;margin-bottom:13px;margin-top:6px;}

    /* BOTÓN PRINCIPAL */
    .btn-agregar{
      width:100%;
      background:#1a5c2a;color:white;
      border:none;border-radius:8px;
      padding:14px;font-size:16px;font-weight:bold;
      cursor:pointer;letter-spacing:.3px;
      display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 3px 8px rgba(26,92,42,.3);
      transition:background .15s,transform .1s,box-shadow .15s;
      -webkit-tap-highlight-color:transparent;}
    .btn-agregar:hover{background:#145022;
      box-shadow:0 4px 12px rgba(26,92,42,.4);}
    .btn-agregar:active{transform:scale(.98);}
    .btn-agregar:disabled{background:#aaa;
      box-shadow:none;cursor:not-allowed;}

    /* BOTONES SECUNDARIOS */
    .btns-sec{display:flex;gap:10px;}
    .btn-sec{
      flex:1;border:none;border-radius:8px;
      padding:11px;font-size:13px;font-weight:bold;
      cursor:pointer;text-align:center;text-decoration:none;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s,transform .1s;
      -webkit-tap-highlight-color:transparent;}
    .btn-limpiar{background:#e9ecef;color:#555;}
    .btn-limpiar:hover{background:#dee2e6;}
    .btn-cancelar{background:#e9ecef;color:#555;}
    .btn-cancelar:hover{background:#dee2e6;}
    .btn-sec:active{transform:scale(.97);}

    /* MÓVIL */
    @media(max-width:480px){
      .dos-col{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>PROCURADURÍA AGRARIA</h1>
    <p>DESARROLLO TERRITORIAL — Nueva Actividad</p>
  </div>
</header>

<!-- TOAST (aviso flotante) -->
<div class="toast" id="toast"></div>

<div class="main">
  <div class="card">
    <div class="card-hdr">
      <span>📋 Registrar Nueva Actividad</span>
      <a href="index.html">← Volver</a>
    </div>

    <div class="card-body">

      <!-- FUNCIONARIO -->
      <div class="seccion">👤 Datos del funcionario</div>

      <div class="fr">
        <label>Nombre completo <span style="color:red">*</span></label>
        <input type="text" id="fNombre"
               placeholder="Apellido Apellido Nombre"
               oninput="guardarLS('pa_nombre',this.value)"/>
        <div class="tip">💡 Se recuerda para la próxima vez.</div>
      </div>

      <div class="dos-col">
        <div class="fr">
          <label>Puesto <span style="color:red">*</span></label>
          <input type="text" id="fPuesto"
                 placeholder="Ej: Visitador Agrario"
                 oninput="guardarLS('pa_puesto',this.value)"/>
        </div>
        <div class="fr">
          <label>Municipio <span style="color:red">*</span></label>
          <input type="text" id="fMunicipio"
                 placeholder="Ej: San Luis Potosí"
                 oninput="guardarLS('pa_municipio',this.value)"/>
        </div>
      </div>

      <div class="fr">
        <label>Núcleo Agrario</label>
        <input type="text" id="fNucleo"
               placeholder="Ej: Ejido El Rosario"/>
      </div>

      <!-- ACTIVIDAD -->
      <div class="seccion">📋 Datos de la actividad</div>

      <div class="fr">
        <label>Fecha <span style="color:red">*</span></label>
        <input type="date" id="fFecha"/>
      </div>

      <div class="dos-col">
  <div class="fr">
    <label>Camioneta</label>
    <input type="text" id="fCamioneta"
           placeholder="Ej: NP300">
  </div>

  <div class="fr">
    <label>Placa</label>
    <input type="text" id="fPlaca"
           placeholder="Ej: TC-1234-A">
  </div>
</div>

<div class="fr">
  <label>Folio</label>
  <input type="text" id="fFolio"
         placeholder="Ej: PA-2026-001">
</div>
      <div class="fr">
        <label>Tipo de Actividad <span style="color:red">*</span></label>
        <input type="text" id="fTipo"
               placeholder="Ej: Oficina, Campo, Reunión..."/>
      </div>

      <div class="dos-col">
        <div class="fr">
          <label>Hora inicio <span style="color:red">*</span></label>
          <input type="time" id="fInicio" value="09:00"/>
        </div>
        <div class="fr">
          <label>Hora término <span style="color:red">*</span></label>
          <input type="time" id="fTermino" value="15:00"/>
        </div>
      </div>

      <div class="fr">
        <label>Descripción <span style="color:red">*</span>
          <span style="font-weight:normal;color:#999">(máx. 250)</span>
        </label>
        <textarea id="fDesc" maxlength="250"
          placeholder="Describe la actividad realizada..."
          oninput="document.getElementById('chars').textContent=250-this.value.length">
        </textarea>
        <div class="char"><span id="chars">250</span> caracteres restantes</div>
      </div>

      <div class="fr" style="margin-bottom:0">
        <label>Resultado / Observaciones</label>
        <input type="text" id="fResultado"
               placeholder="Ej: Actividad completada"/>
      </div>

    </div><!-- /card-body -->

    <!-- PIE -->
    <div class="card-ftr">
      <!-- Botón principal -->
      <button class="btn-agregar" id="btnAgregar" onclick="guardarActividad()">
        ✔ AGREGAR ACTIVIDAD
      </button>
      <!-- Botones secundarios -->
      <div class="btns-sec">
        <button class="btn-sec btn-limpiar" onclick="limpiarForm()">
          🗑 Limpiar campos
        </button>
        <a href="index.html" class="btn-sec btn-cancelar">
          ✕ Cancelar
        </a>
      </div>
    </div>

  </div><!-- /card -->
</div><!-- /main -->

<script>
/* ══════════════════════════════════════════════
   🔌 URL DE TU GOOGLE APPS SCRIPT
   ══════════════════════════════════════════════ */
const API_URL = "https://script.google.com/macros/s/AKfycbw5CkYte-SKBKxpMEu2j3JeR8xcJwDDGeTWpkXyhC02zFrWrgSQkx5XteIpMkif7NP9/exec";

/* ══════════════════════════════════════════════
   TOAST — aviso flotante
   ══════════════════════════════════════════════ */
function mostrarToast(msg, tipo = 'ok', ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${tipo} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => {
    t.classList.remove('show');
  }, ms);
}

/* ══════════════════════════════════════════════
   RECORDAR DATOS EN localStorage
   ══════════════════════════════════════════════ */
function guardarLS(key, val) {
  if (val.trim()) localStorage.setItem(key, val.trim());
}

function cargarLS() {
  const set = (id, key) => {
    const v = localStorage.getItem(key);
    if (v) document.getElementById(id).value = v;
  };
  /* Solo nombre, puesto y municipio se recuerdan */
  set('fNombre',    'pa_nombre');
  set('fPuesto',    'pa_puesto');
  set('fMunicipio', 'pa_municipio');
}

/* ══════════════════════════════════════════════
   GUARDAR ACTIVIDAD
   ══════════════════════════════════════════════ */
async function guardarActividad() {
  
  const nombre    = document.getElementById('fNombre').value.trim();
  const puesto    = document.getElementById('fPuesto').value.trim();
  const municipio = document.getElementById('fMunicipio').value.trim();
  const nucleo    = document.getElementById('fNucleo').value.trim();
  const fecha     = document.getElementById('fFecha').value;
  const tipo      = document.getElementById('fTipo').value.trim();
  const inicio    = document.getElementById('fInicio').value;
  const termino   = document.getElementById('fTermino').value;
  const desc      = document.getElementById('fDesc').value.trim();
  const resultado = document.getElementById('fResultado').value.trim();
  const camioneta = document.getElementById('fCamioneta').value.trim();
  const placa     = document.getElementById('fPlaca').value.trim();
  const folio     = document.getElementById('fFolio').value.trim();

  /* Validaciones */
  if (!nombre)           { mostrarToast('⚠ Escribe tu nombre completo.','err');           return; }
  if (!puesto)           { mostrarToast('⚠ Escribe tu puesto.','err');                    return; }
  if (!municipio)        { mostrarToast('⚠ Escribe el municipio.','err');                 return; }
  if (!fecha)            { mostrarToast('⚠ Selecciona una fecha.','err');                 return; }
  if (!tipo)             { mostrarToast('⚠ Escribe el tipo de actividad.','err');         return; }
  if (!inicio)           { mostrarToast('⚠ Indica la hora de inicio.','err');             return; }
  if (!termino)          { mostrarToast('⚠ Indica la hora de término.','err');            return; }
  if (inicio >= termino) { mostrarToast('⚠ El inicio debe ser menor al término.','err'); return; }
  if (!desc)             { mostrarToast('⚠ Escribe una descripción.','err');              return; }

  /* Deshabilitar botón */
  const btn = document.getElementById('btnAgregar');
  btn.disabled    = true;
  btn.textContent = '⏳ Guardando...';

  try {
    const form = new FormData();
    form.append('action',      'save');
    form.append('nombre',      nombre);
    form.append('puesto',      puesto);
    form.append('municipio',   municipio);
    form.append('nucleo',      nucleo);
    form.append('fecha',       fecha);
    form.append('inicio',      inicio);
    form.append('termino',     termino);
    form.append('tipo',        tipo);
    form.append('descripcion', desc);
    form.append('resultado',   resultado);
    form.append('camioneta', camioneta);
    form.append('placa', placa);
    form.append('folio', folio);

    const r    = await fetch(API_URL, { method: 'POST', body: form });
    const data = await r.json();

    if (data.ok) {


      /* Mostrar toast de éxito */
      mostrarToast('✅ Actividad registrada correctamente.', 'ok', 2000);

      /* Limpiar campos de actividad (NO nombre/puesto/municipio) */
      limpiarCamposActividad();

      /* Ir al inicio después de 2 segundos */
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);

    } else {
      mostrarToast('❌ Error: ' + (data.mensaje || 'Intenta de nuevo.'), 'err', 3000);
      btn.disabled    = false;
      btn.textContent = '✔ AGREGAR ACTIVIDAD';
    }

  } catch(e) {
    console.error(e);
    mostrarToast('❌ Error de conexión. Intenta de nuevo.', 'err', 3000);
    btn.disabled    = false;
    btn.textContent = '✔ AGREGAR ACTIVIDAD';
  }
}

/* ══════════════════════════════════════════════
   LIMPIAR
   ══════════════════════════════════════════════ */
function limpiarForm() {
  if (!confirm('¿Limpiar todos los campos?')) return;
  /* Limpiar TODO incluyendo nombre/puesto/municipio */
  document.getElementById('fNombre').value    = '';
  document.getElementById('fPuesto').value    = '';
  document.getElementById('fMunicipio').value = '';
  limpiarCamposActividad();
}

function limpiarCamposActividad() {
  /* Solo limpia los campos de actividad */
  document.getElementById('fNucleo').value    = '';
  document.getElementById('fFecha').value     = getFechaActiva();
  document.getElementById('fTipo').value      = '';
  document.getElementById('fInicio').value    = '09:00';
  document.getElementById('fTermino').value   = '15:00';
  document.getElementById('fDesc').value      = '';
  document.getElementById('fResultado').value = '';
  document.getElementById('chars').textContent = '250';
  const btn = document.getElementById('btnAgregar');
  btn.disabled    = false;
  btn.textContent = '✔ AGREGAR ACTIVIDAD';
}

/* ══════════════════════════════════════════════
   UTILIDADES
   ══════════════════════════════════════════════ */
function getFechaActiva() {
  const hoy = new Date();
  const year = hoy.getFullYear();
  const month = String(hoy.getMonth() + 1).padStart(2, '0');
  const day = String(hoy.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

/* ══════════════════════════════════════════════
   INIT — campos vacíos al entrar
   ══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  /* Campos de actividad siempre vacíos al entrar */
  const hoy = new Date();
  const fecha =
    hoy.getFullYear() + '-' +
    String(hoy.getMonth() + 1).padStart(2, '0') + '-' +
    String(hoy.getDate()).padStart(2, '0');
  document.getElementById('fNucleo').value    = '';
  document.getElementById('fFecha').value     = getFechaActiva();
  document.getElementById('fTipo').value      = '';
  document.getElementById('fInicio').value    = '09:00';
  document.getElementById('fTermino').value   = '15:00';
  document.getElementById('fDesc').value      = '';
  document.getElementById('fResultado').value = '';
  
  document.getElementById('chars').textContent = '250';
});
</script>
</body>
</html>
