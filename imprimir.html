<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Imprimir Actividades</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;font-size:13px;background:#f0f0f0;color:#222;}

    header{background:#1a5c2a;color:white;padding:12px 16px;
           display:flex;align-items:center;gap:10px;}
    header h1{font-size:17px;letter-spacing:.5px;}
    header p{font-size:11px;opacity:.85;margin-top:2px;}

    .main{max-width:1100px;margin:12px auto;padding:0 12px;}

    /* CONTROLES */
    .controles{background:#fff;border:1px solid #ccc;border-radius:8px;
               padding:14px;margin-bottom:14px;
               display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;}
    .ctrl-grupo{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px;}
    .ctrl-grupo label{font-size:12px;font-weight:bold;color:#333;}
    .ctrl-grupo input[type=date]{padding:8px;border:1px solid #ccc;
                                  border-radius:6px;font-size:13px;width:100%;}

    /* RESUMEN */
    .resumen{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
    .res-card{background:white;border:1px solid #ccc;border-radius:8px;
              padding:10px 16px;text-align:center;flex:1;min-width:100px;}
    .res-card .num{font-size:24px;font-weight:bold;color:#1a5c2a;}
    .res-card .lbl{font-size:11px;color:#666;margin-top:2px;}

    /* TITULO PERIODO */
    .titulo-periodo{background:#1a5c2a;color:white;padding:8px 14px;
                    border-radius:6px;font-weight:bold;font-size:13px;
                    margin-bottom:12px;display:none;}

    /* BLOQUE DÍA */
    .dia-bloque{background:white;border:1px solid #ccc;border-radius:8px;
                margin-bottom:12px;overflow:hidden;}
    .dia-titulo{background:#1a5c2a;color:white;padding:7px 14px;
                font-size:13px;font-weight:bold;
                display:flex;justify-content:space-between;
                align-items:center;flex-wrap:wrap;gap:4px;}
    .dia-titulo .conteo{font-size:11px;opacity:.85;font-weight:normal;}

    /* TABLA */
    .twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    table{width:100%;border-collapse:collapse;min-width:500px;}
    thead tr{background:#2d7a3e;color:white;}
    thead th{padding:6px 8px;text-align:center;font-size:11px;white-space:nowrap;}
    tbody tr:nth-child(even){background:#f7f7f7;}
    tbody td{padding:6px 8px;font-size:11px;vertical-align:middle;
             border-bottom:1px solid #eee;word-break:break-word;}
    .td-desc{max-width:200px;}
    .badge{display:inline-block;background:#d4edda;color:#155724;
           border-radius:10px;padding:2px 8px;font-size:10px;white-space:nowrap;}

    /* SIN RESULTADOS */
    .sin-res{background:white;border:1px solid #ccc;border-radius:8px;
             text-align:center;padding:40px;color:#888;font-size:14px;}

    /* BOTONES */
    .btn{border:none;border-radius:6px;cursor:pointer;padding:9px 16px;
         font-size:13px;font-weight:bold;
         -webkit-tap-highlight-color:transparent;}
    .bv{background:#1a5c2a;color:white;}
    .bv:hover{background:#145022;}
    .ba{background:#ffd700;color:#222;}
    .ba:hover{background:#e6c200;}
    .bg{background:#888;color:white;}

    /* MÓVIL */
    @media(max-width:600px){
      .controles{flex-direction:column;}
      .ctrl-grupo{min-width:unset;width:100%;}
      .btn{width:100%;text-align:center;}
      .resumen{gap:8px;}
      .res-card{min-width:80px;}
    }

    /* ══════════════════════════════
       IMPRESIÓN
       ══════════════════════════════ */
    @media print{
      .no-print{display:none !important;}
      body{background:white;font-size:11px;}

      header{
        background:#1a5c2a !important;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
        padding:8px 14px;
      }
      .main{padding:0 8px;}
      .resumen{margin-bottom:8px;}
      .res-card{padding:6px 10px;}
      .res-card .num{font-size:18px;}

      .dia-bloque{margin-bottom:8px;page-break-inside:avoid;border:1px solid #999;}
      .dia-titulo{
        background:#1a5c2a !important;
        color:white !important;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
      }
      thead tr{
        background:#2d7a3e !important;
        color:white !important;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
      }
      thead th{padding:4px 6px;font-size:10px;}
      tbody td{padding:4px 6px;font-size:10px;border:1px solid #ddd;}
      tbody tr:nth-child(even) td{
        background:#f5f5f5 !important;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
      }
      .badge{
        background:#d4edda !important;
        color:#155724 !important;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
      }
      .titulo-periodo{
        background:#1a5c2a !important;
        color:white !important;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
      }
      .pie-impresion{display:block !important;}
    }

    .pie-impresion{
      display:none;text-align:center;font-size:10px;
      color:#666;margin-top:16px;border-top:1px solid #ccc;padding-top:8px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>PROCURADURÍA AGRARIA</h1>
    <p>DESARROLLO TERRITORIAL — Reporte de Actividades</p>
  </div>
</header>

<div class="main">

  <!-- CONTROLES -->
  <div class="controles no-print">
    <div class="ctrl-grupo">
      <label>Del:</label>
      <input type="date" id="ctrlDesde"/>
    </div>
    <div class="ctrl-grupo">
      <label>Al:</label>
      <input type="date" id="ctrlHasta"/>
    </div>
    <button class="btn bv" onclick="cargarReporte()">🔍 Ver reporte</button>
    <button class="btn ba" onclick="window.print()">🖨 Imprimir / PDF</button>
    <a href="index.html" class="btn bg"
       style="text-decoration:none;display:inline-flex;
              align-items:center;justify-content:center;">
      ← Volver
    </a>
  </div>

  <!-- RESUMEN -->
  <div class="resumen" id="resumen" style="display:none"></div>

  <!-- TÍTULO PERÍODO -->
  <div class="titulo-periodo" id="tituloPeriodo"></div>

  <!-- CONTENIDO -->
  <div id="contenido"></div>

  <!-- PIE IMPRESIÓN -->
  <div class="pie-impresion" id="pieImpresion">
    Procuraduría Agraria — Desarrollo Territorial &nbsp;|&nbsp;
    Reporte generado el <span id="pieDate"></span>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════
   🔌 URL DE TU GOOGLE APPS SCRIPT
   ══════════════════════════════════════════════ */
const API_URL = "https://script.google.com/macros/s/AKfycbw5CkYte-SKBKxpMEu2j3JeR8xcJwDDGeTWpkXyhC02zFrWrgSQkx5XteIpMkif7NP9/exec";

/* ══════════════════════════════════════════════
   UTILIDADES
   ══════════════════════════════════════════════ */
function fmtFecha(d) {
  return d.getFullYear() + '-' +
         String(d.getMonth()+1).padStart(2,'0') + '-' +
         String(d.getDate()).padStart(2,'0');
}
function parseFecha(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d, 12);
}
function labelLargo(s) {
  return parseFecha(s).toLocaleDateString('es-MX',
    {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function labelCorto(s) {
  return parseFecha(s).toLocaleDateString('es-MX',
    {day:'2-digit',month:'long',year:'numeric'});
}
function fmtHora(val) {
  if (!val) return '—';
  if (typeof val === 'string' && /^\d{1,2}:\d{2}/.test(val))
    return val.substring(0,5);
  if (typeof val === 'number') {
    const min = Math.round(val * 1440);
    return String(Math.floor(min/60)).padStart(2,'0') + ':' +
           String(min%60).padStart(2,'0');
  }
  try { return new Date(val).toLocaleTimeString('es-MX',
    {hour:'2-digit',minute:'2-digit'}); }
  catch { return String(val); }
}
function limpiarFecha(val) {
  let f = String(val||'').trim();
  if (f.includes('T')) f = f.split('T')[0];
  return f;
}

/* ══════════════════════════════════════════════
   CARGAR DATOS
   ══════════════════════════════════════════════ */
async function cargarReporte() {
  const desde = document.getElementById('ctrlDesde').value;
  const hasta  = document.getElementById('ctrlHasta').value;

  if (!desde || !hasta) { alert('Selecciona el rango de fechas.'); return; }
  if (desde > hasta)    { alert('"Del" no puede ser mayor que "Al".'); return; }

  document.getElementById('contenido').innerHTML =
    '<p style="text-align:center;color:#1a5c2a;padding:20px">⏳ Cargando datos...</p>';

  try {
    const r    = await fetch(API_URL + '?ts=' + Date.now());
    const rows = await r.json();

    /* Agrupar por fecha dentro del rango */
    const mapa = {};
    rows.slice(1).forEach(row => {
      const f = limpiarFecha(row[7]); /* col 5 = fecha */
      if (f >= desde && f <= hasta) {
        if (!mapa[f]) mapa[f] = [];
        mapa[f].push({
  id:          row[0],
  nombre:      row[1],
  puesto:      row[2],
  municipio:   row[3],

  camioneta:   row[4],
  placa:       row[5],

  nucleo:      row[6],
  fecha:       row[7],
  inicio:      row[8],
  termino:     row[9],
  tipo:        row[10],
  descripcion: row[11],
  resultado:   row[12],
  timestamp:   row[13]
});
      }
    });

    const dias = Object.keys(mapa).sort();
    renderReporte(dias, mapa, desde, hasta);
    history.replaceState(null,'',`?desde=${desde}&hasta=${hasta}`);

  } catch(e) {
    document.getElementById('contenido').innerHTML =
      '<div class="sin-res">❌ Error al cargar datos. Revisa la conexión.</div>';
  }
}

/* ══════════════════════════════════════════════
   RENDERIZAR
   ══════════════════════════════════════════════ */
function renderReporte(dias, mapa, desde, hasta) {

  /* Totales */
  let totalActs = 0;
  const porTipo = {};
  dias.forEach(f => {
    mapa[f].forEach(a => {
      totalActs++;
      porTipo[a.tipo] = (porTipo[a.tipo]||0) + 1;
    });
  });

  /* Título período */
  const tit = document.getElementById('tituloPeriodo');
  tit.textContent  = '📅 Período: ' + labelCorto(desde) + ' — ' + labelCorto(hasta);
  tit.style.display = 'block';

  /* Tarjetas resumen */
  const res = document.getElementById('resumen');
  res.style.display = 'flex';
  res.innerHTML = `
    <div class="res-card">
      <div class="num">${dias.length}</div>
      <div class="lbl">Días con actividad</div>
    </div>
    <div class="res-card">
      <div class="num">${totalActs}</div>
      <div class="lbl">Total actividades</div>
    </div>
    ${Object.entries(porTipo).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`
    <div class="res-card">
      <div class="num">${n}</div>
      <div class="lbl">${t||'—'}</div>
    </div>`).join('')}`;

  /* Sin resultados */
  if (!dias.length) {
    document.getElementById('contenido').innerHTML = `
      <div class="sin-res">
        📭 No hay actividades en el período seleccionado.<br>
        <small style="color:#aaa;display:block;margin-top:8px">
          ${labelCorto(desde)} al ${labelCorto(hasta)}
        </small>
      </div>`;
    return;
  }

  /* Bloques por día */
  document.getElementById('contenido').innerHTML = dias.map(f => `
    <div class="dia-bloque">
      <div class="dia-titulo">
        <span>📅 ${labelLargo(f)}</span>
        <span class="conteo">
          ${mapa[f].length} actividad${mapa[f].length!==1?'es':''}
        </span>
      </div>
      <div class="twrap">
        <table>
          <thead>
            <tr>
              <th>INICIO</th>
              <th>TÉRMINO</th>
              <th>NOMBRE</th>
              <th>CAMIONETA</th>
<th>PLACA</th>
              <th>PUESTO</th>
              <th>MUNICIPIO</th>
              <th>NÚCLEO AGRARIO</th>
              <th>ACTIVIDAD</th>
              <th class="td-desc">DESCRIPCIÓN</th>
              <th>RESULTADO</th>
            </tr>
          </thead>
          <tbody>
            ${mapa[f].map(a=>`
            <tr>
  <td>${fmtHora(a.inicio)}</td>
  <td>${fmtHora(a.termino)}</td>

  <td>${a.nombre || '—'}</td>
  <td>${a.camioneta || '—'}</td>
  <td>${a.placa || '—'}</td>

  <td>${a.puesto || '—'}</td>
  <td>${a.municipio || '—'}</td>
  <td>${a.nucleo || '—'}</td>

  <td><span class="badge">${a.tipo || '—'}</span></td>
  <td>${a.descripcion || '—'}</td>
  <td>${a.resultado || '—'}</td>
</tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`).join('');

  /* Pie de impresión */
  document.getElementById('pieDate').textContent =
    new Date().toLocaleDateString('es-MX',
      {day:'2-digit',month:'long',year:'numeric'});
}

/* ══════════════════════════════════════════════
   LEER PARÁMETROS DE URL
   ══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const p     = new URLSearchParams(window.location.search);
  const desde = p.get('desde') || '';
  const hasta  = p.get('hasta')  || '';
  const hoy   = fmtFecha(new Date());

  if (desde && hasta) {
    document.getElementById('ctrlDesde').value = desde;
    document.getElementById('ctrlHasta').value  = hasta;
    cargarReporte();
  } else {
    /* Por defecto: mes actual */
    const primerDia = new Date();
    primerDia.setDate(1);
    document.getElementById('ctrlDesde').value = fmtFecha(primerDia);
    document.getElementById('ctrlHasta').value  = hoy;
  }
});
</script>
</body>
</html>
